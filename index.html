<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Business Planner — Quản lý phương án kinh doanh, hợp đồng và kế hoạch dự án. Bảo mật, song ngữ Việt-Anh.">
  <meta name="theme-color" content="#0a0e1a">
  <title>Business Planner — Quản lý Kinh doanh & Hợp đồng</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- jsPDF + AutoTable (PDF export) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>

  <!-- SheetJS (Excel export) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- docx.js (Word export) -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <!-- App Container -->
  <div id="appContainer">
    <!-- Initial loading -->
    <div class="login-screen">
      <div style="text-align:center">
        <div class="spinner" style="margin:0 auto var(--space-xl)"></div>
        <p class="text-sm text-muted">Loading...</p>
      </div>
    </div>
  </div>

  <!-- Modal container -->
  <div id="modalContainer"></div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- JS Modules (order matters) -->
  <script src="js/i18n.js?v=1.3"></script>
  <script src="js/supabase-client.js?v=1.3"></script>
  <script src="js/crypto.js?v=1.3"></script>
  <script src="js/storage.js?v=1.3"></script>
  <script src="js/auth.js?v=1.3"></script>
  <script src="js/business-plan.js?v=1.3"></script>
  <script src="js/catalog.js?v=1.3"></script>
  <script src="js/contracts.js?v=1.3"></script>
  <script src="js/planning.js?v=1.3"></script>
  <script src="js/export.js?v=1.3"></script>
  <script src="js/admin.js?v=1.3"></script>
  <script src="js/app.js?v=1.3"></script>
</body>
</html>
